<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidslist – isometrische 3D-Fahrt (Konzept)</title>
<style>
  @font-face{font-family:'Fredoka';font-weight:700;font-display:swap;src:url('fredoka.woff2') format('woff2')}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Fredoka',system-ui,sans-serif;background:#dcefff;color:#1B1B2F}
  #c{position:fixed;inset:0;z-index:0}
  #scroller{position:relative;height:560vh;z-index:1;pointer-events:none}
  .hud{position:fixed;top:1rem;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
  .hud svg{width:150px;height:auto;filter:drop-shadow(0 4px 10px rgba(0,0,0,.2))}
  .cap{position:fixed;left:0;right:0;bottom:8%;text-align:center;z-index:5;pointer-events:none;transition:opacity .4s}
  .cap b{display:inline-block;background:rgba(255,255,255,.92);padding:.5rem 1.2rem;border-radius:999px;font-size:1.15rem;box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .scroll-hint{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);font-size:1.6rem;opacity:.6;z-index:5;animation:b 1.5s infinite}
  @keyframes b{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}
</style>
</head>
<body>
<div id="c"></div>
<div class="hud">
  <svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" aria-label="kidslist">
    <defs><style>.kdzwm{font-family:'Fredoka',sans-serif;font-weight:700;font-size:230px;letter-spacing:-14px;paint-order:stroke fill;stroke:#1B1B2F;stroke-width:10;stroke-linejoin:round}</style></defs>
    <text class="kdzwm" text-anchor="middle" x="610" y="270" fill="#1B1B2F">kidslist</text>
    <text class="kdzwm" text-anchor="middle" x="600" y="260"><tspan fill="#FF3B30">k</tspan><tspan fill="#FF9500">i</tspan><tspan fill="#FFC72C">d</tspan><tspan fill="#2ECF6E">s</tspan><tspan fill="#2D7CF6">l</tspan><tspan fill="#5856D6">i</tspan><tspan fill="#AF52DE">s</tspan><tspan fill="#FF3D77">t</tspan></text>
  </svg>
</div>
<div class="cap" id="cap"><b>Steig ein – wir fahren durch Kidslist</b></div>
<div class="scroll-hint">⌄</div>
<div id="scroller"></div>

<script src="lib/three.min.js"></script>
<script>
const scene=new THREE.Scene(); scene.background=new THREE.Color(0xdcefff);
scene.fog=new THREE.Fog(0xdcefff, 40, 95);
let W=innerWidth,H=innerHeight, aspect=W/H, D=15;
const cam=new THREE.OrthographicCamera(-D*aspect,D*aspect,D,-D,0.1,500);
scene.add(new THREE.AmbientLight(0xffffff,0.82));
const dl=new THREE.DirectionalLight(0xffffff,0.85); dl.position.set(12,26,6); dl.castShadow=true;
dl.shadow.mapSize.set(1024,1024); dl.shadow.camera.left=-40;dl.shadow.camera.right=40;dl.shadow.camera.top=40;dl.shadow.camera.bottom=-40; scene.add(dl);
const rnd=new THREE.WebGLRenderer({antialias:true,alpha:true});
rnd.setSize(W,H); rnd.setPixelRatio(Math.min(2,devicePixelRatio)); rnd.shadowMap.enabled=true; rnd.shadowMap.type=THREE.PCFSoftShadowMap;
document.getElementById('c').appendChild(rnd.domElement);

// Boden (Wiese)
const ground=new THREE.Mesh(new THREE.PlaneGeometry(300,400),new THREE.MeshStandardMaterial({color:0x96dd83}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// Weg-Kurve (S-Kurve in die Tiefe, -z)
const pts=[]; for(let i=0;i<=24;i++){ pts.push(new THREE.Vector3(Math.sin(i*0.5)*8, 0.02, -i*7)); }
const curve=new THREE.CatmullRomCurve3(pts);
// Straße als flaches Band (breite, flache Röhre)
const road=new THREE.Mesh(new THREE.TubeGeometry(curve,240,2.2,4,false), new THREE.MeshStandardMaterial({color:0xeacf93}));
road.scale.y=0.05; road.receiveShadow=true; scene.add(road);
// Glühende Mittellinie (emissive)
const glow=new THREE.Mesh(new THREE.TubeGeometry(curve,240,0.22,8,false), new THREE.MeshBasicMaterial({color:0xffe14d}));
glow.position.y=0.18; scene.add(glow);

// 3D-Objekte am Weg: Haeuser (Boxen) + Baeume (Kegel)
const COLS=[0xff8aa0,0x8ac7ff,0xffd23f,0xa0e090,0xc6a8ff,0xff9f6e];
function haus(x,z,w,h,col){const g=new THREE.Group();
  const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,w),new THREE.MeshStandardMaterial({color:col}));b.position.y=h/2;b.castShadow=true;
  const dach=new THREE.Mesh(new THREE.ConeGeometry(w*0.82,h*0.5,4),new THREE.MeshStandardMaterial({color:0xffffff}));dach.position.y=h+h*0.25;dach.rotation.y=Math.PI/4;dach.castShadow=true;
  g.add(b,dach); g.position.set(x,0,z); scene.add(g); }
function baum(x,z,s){const g=new THREE.Group();
  const st=new THREE.Mesh(new THREE.CylinderGeometry(0.18*s,0.22*s,1.1*s,6),new THREE.MeshStandardMaterial({color:0xb07b4a}));st.position.y=0.55*s;
  const kr=new THREE.Mesh(new THREE.ConeGeometry(0.9*s,1.8*s,8),new THREE.MeshStandardMaterial({color:0x59b85a}));kr.position.y=1.7*s;kr.castShadow=true;
  g.add(st,kr); g.position.set(x,0,z); scene.add(g); }
for(let i=2;i<24;i++){ const c=curve.getPointAt(i/24); const side=(i%2?1:-1);
  if(i%2) haus(c.x+side*(6+Math.random()*4), c.z, 2+Math.random()*1.5, 2.5+Math.random()*4, COLS[i%COLS.length]);
  else baum(c.x+side*(5+Math.random()*4), c.z, 0.8+Math.random()*0.7);
  // Streu-Baum auf der anderen Seite
  baum(c.x-side*(7+Math.random()*5), c.z+3, 0.7+Math.random()*0.6);
}

// Auto (kleines Box-Modell)
const car=new THREE.Group();
const body=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.8,2.8),new THREE.MeshStandardMaterial({color:0xff3b30}));body.position.y=0.65;body.castShadow=true;
const cab=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.7,1.4),new THREE.MeshStandardMaterial({color:0x4da6ff}));cab.position.set(0,1.25,-0.1);
const w1=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.3,12),new THREE.MeshStandardMaterial({color:0x1b1b2f}));
[[0.85,0.4,0.9],[-0.85,0.4,0.9],[0.85,0.4,-0.9],[-0.85,0.4,-0.9]].forEach(p=>{const w=w1.clone();w.rotation.z=Math.PI/2;w.position.set(...p);car.add(w);});
car.add(body,cab); scene.add(car);

// Sonne (Kugel hoch oben, nur Optik)
const sun=new THREE.Mesh(new THREE.SphereGeometry(3,16,16),new THREE.MeshBasicMaterial({color:0xffe14d}));sun.position.set(20,22,-20);scene.add(sun);

const CAM_OFF=new THREE.Vector3(15,17,15);   // isometrischer Kamera-Versatz hinter/ueber dem Auto
function setT(t){
  t=Math.max(0,Math.min(0.999,t));
  const p=curve.getPointAt(t), p2=curve.getPointAt(Math.min(0.999,t+0.008));
  car.position.set(p.x,0,p.z); car.lookAt(p2.x,0,p2.z);
  cam.position.set(p.x+CAM_OFF.x, CAM_OFF.y, p.z+CAM_OFF.z);
  cam.lookAt(p.x, 0, p.z-4);
}
setT(0);
let curT=0,tgtT=0;
function animate(){requestAnimationFrame(animate); curT+=(tgtT-curT)*0.1; setT(curT); rnd.render(scene,cam);}
animate();

const caps=[[0,"Steig ein – wir fahren durch Kidslist"],[0.16,"Morgens & abends – Routine abhaken"],[0.34,"Logos sammeln & belohnen"],[0.52,"Vier Spiele zum Mitspielen"],[0.7,"33 Charaktere"],[0.88,"Sicher & fair – bald verfügbar"]];
addEventListener('scroll',()=>{const max=document.getElementById('scroller').offsetHeight-innerHeight;tgtT=Math.max(0,Math.min(1,scrollY/max));
  let lab=caps[0][1]; for(const c of caps){if(tgtT>=c[0])lab=c[1];} document.getElementById('cap').querySelector('b').textContent=lab;});
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;aspect=W/H;cam.left=-D*aspect;cam.right=D*aspect;cam.top=D;cam.bottom=-D;cam.updateProjectionMatrix();rnd.setSize(W,H);});
</script>
</body>
</html>
