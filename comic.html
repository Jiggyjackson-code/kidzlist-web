<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kidslist – Comic (Last-War-Format, Justier-Prototyp)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1F1F2E; --cream:#FAF6EE; --surface:#fff;
    --yellow:#FFC72C; --pink:#E04279; --blue:#2E6CD9; --green:#3FA56A;
    --orange:#FF8A3D; --indigo:#6366F1; --magenta:#C026D3; --red:#DC4C5D;

    /* ===== JUSTIERBARE ANIMATIONS-WERTE (per Regler unten) ===== */
    --pageh: 88;      /* Seitenhoehe in vh (fast voller Bildschirm) */
    --stag: 0.42;     /* Panel-Tempo: Abstand zwischen den Panels (s) */
    --pop: 0.62;      /* Pop-Dauer je Panel (s) */
    --pops: 0.80;     /* Pop-Startgroesse (0.8 = von klein herein) */
    --popr: 2.5;      /* Pop-Schwung als Drehung (Grad) */
    --kb: 1.08;       /* Ken-Burns Zoom-Faktor (1 = aus) */
    --kbt: 7;         /* Ken-Burns Dauer (s) */
    --bubd: 0.30;     /* Sprechblase: Extra-Verzoegerung nach dem Panel (s) */
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:#efe7d6;color:var(--ink);font-family:'Nunito',system-ui,sans-serif}
  body{display:flex;flex-direction:column;align-items:center;padding-bottom:3rem}

  /* Kopf: Logo + Steuerung */
  header{position:sticky;top:0;z-index:30;width:100%;max-width:460px;
    display:flex;align-items:center;justify-content:space-between;gap:.5rem;
    padding:.55rem .8rem;background:rgba(250,246,238,.92);backdrop-filter:blur(6px);
    border-bottom:2px solid rgba(31,31,46,.08)}
  .logo{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:-.5px}
  .logo span{display:inline-block}
  .ctrl{display:flex;align-items:center;gap:.4rem}
  .lang{display:flex;gap:2px;background:#fff;border:2px solid var(--ink);border-radius:999px;padding:2px}
  .lang button{font:inherit;font-weight:800;font-size:.72rem;border:0;background:none;color:var(--ink);
    padding:.18rem .42rem;border-radius:999px;cursor:pointer;opacity:.5}
  .lang button.on{background:var(--ink);color:#fff;opacity:1}
  .play{font:inherit;font-weight:800;font-size:.8rem;border:2px solid var(--ink);background:var(--yellow);
    color:var(--ink);border-radius:999px;padding:.3rem .7rem;cursor:pointer;box-shadow:0 3px 0 var(--ink)}
  .play:active{transform:translatey(2px);box-shadow:0 1px 0 var(--ink)}

  .stage{width:100%;max-width:460px;padding:.8rem .7rem 0}

  /* ===== Eine grosse Comic-Seite (fuellt das Hochformat) ===== */
  .page{display:flex;flex-direction:column;min-height:calc(var(--pageh) * 1vh);
    background:var(--cream);border:3px solid var(--ink);border-radius:1.2rem;
    padding:.75rem .7rem .8rem;margin-bottom:1.1rem;box-shadow:0 10px 0 rgba(31,31,46,.12)}
  .band{font-family:'Fredoka',sans-serif;font-weight:600;text-align:center;line-height:1.22;
    background:var(--yellow);border:3px solid var(--ink);border-radius:.85rem;
    padding:.5rem .65rem;box-shadow:0 4px 0 var(--ink)}
  .band.top{font-size:1.08rem;margin-bottom:.6rem}
  .band.bot{font-size:.96rem;margin-top:.6rem;background:#fff}

  /* Last-War-Raster: gemischte Panel-Groessen, fuellt die Hoehe */
  .grid{flex:1;display:grid;gap:.5rem;grid-template-columns:1fr 1fr;
    grid-template-rows:1.15fr 1fr 1.15fr;
    grid-template-areas:"a a" "b c" "d d"}
  .area-a{grid-area:a} .area-b{grid-area:b} .area-c{grid-area:c} .area-d{grid-area:d}

  .cpanel{position:relative;border:3px solid var(--ink);border-radius:.7rem;overflow:hidden;
    display:grid;place-items:center;min-height:0;
    opacity:0;transform:scale(var(--pops)) rotate(calc(var(--popr) * -1deg)) translateY(16px)}
  .page.on .cpanel{animation:cpop var(--pop) cubic-bezier(.2,1.5,.4,1) forwards;
    animation-delay:calc(var(--i) * var(--stag) * 1s)}
  /* Ken-Burns-Bildebene (zoomt sanft nach dem Einblenden) */
  .cpic{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;transform:scale(1)}
  .page.on .cpic{animation:kb calc(var(--kbt) * 1s) ease-out forwards;
    animation-delay:calc((var(--i) * var(--stag) + var(--pop)) * 1s)}
  .cpanel.morn{background-color:#bfe0ff;background-image:linear-gradient(165deg,#a9d6ff,#ffe9b8)}
  .cpanel.morn.sunny{background-image:linear-gradient(165deg,#9fd2ff,#fff0c0,#ffd98a)}
  .cpanel.night{background-color:#46578f;background-image:linear-gradient(165deg,#3a4c84,#6c7fb8)}
  .cpanel.night.warm{background-image:linear-gradient(165deg,#3b4a86,#7d6fa8,#caa6c0)}
  .cph{position:relative;z-index:1;font-size:4.2rem;filter:drop-shadow(0 3px 2px rgba(0,0,0,.18));opacity:.92}

  /* Sprechblasen (scharfe Ebene ueber dem Bild) */
  .cbub{position:absolute;z-index:2;max-width:78%;font-weight:800;font-size:.92rem;line-height:1.15;
    background:#fff;color:var(--ink);border:2.5px solid var(--ink);border-radius:.7rem;
    padding:.34rem .52rem;box-shadow:0 2px 0 rgba(31,31,46,.5);opacity:0;transform:scale(.6)}
  .page.on .cbub{animation:bub var(--pop) cubic-bezier(.2,1.7,.4,1) forwards;
    animation-delay:calc((var(--i) * var(--stag) + var(--pop) + var(--bubd)) * 1s)}
  .cbub.tl{top:.45rem;left:.45rem;border-bottom-left-radius:.15rem}
  .cbub.br{right:.45rem;bottom:.45rem;border-bottom-right-radius:.15rem;background:var(--yellow)}
  .cbub.shout{font-size:1.12rem;font-family:'Fredoka',sans-serif;transform:scale(.6) rotate(-3deg)}
  .page.on .cbub.shout{animation:bubshout var(--pop) cubic-bezier(.2,1.7,.4,1) forwards;
    animation-delay:calc((var(--i) * var(--stag) + var(--pop) + var(--bubd)) * 1s)}

  @keyframes cpop{
    from{opacity:0;transform:scale(var(--pops)) rotate(calc(var(--popr) * -1deg)) translateY(16px)}
    60%{opacity:1}100%{opacity:1;transform:none}}
  @keyframes kb{from{transform:scale(1)}to{transform:scale(var(--kb))}}
  @keyframes bub{to{opacity:1;transform:none}}
  @keyframes bubshout{to{opacity:1;transform:rotate(-3deg)}}

  /* Studie als Wendepunkt zwischen den Seiten */
  .study{text-align:center;padding:1.2rem 0 1.6rem;min-height:46vh;
    display:flex;flex-direction:column;justify-content:center}
  .bignum{font-family:'Fredoka',sans-serif;font-weight:700;font-size:3.8rem;line-height:1;
    color:var(--pink);text-shadow:0 4px 0 rgba(31,31,46,.18)}
  .study p{font-weight:700;font-size:.96rem;max-width:22rem;margin:.5rem auto 0}
  .ssrc{font-size:.66rem;opacity:.55;margin-top:.3rem}

  footer{text-align:center;margin-top:.5rem}
  footer .logo{font-size:2rem}
  footer .sub{font-weight:700;font-size:.86rem;opacity:.7;margin-top:.2rem}
  footer .stores{font-size:.78rem;opacity:.6;margin-top:.4rem}

  /* ===== Justier-Panel (fliegt in der echten Seite raus) ===== */
  .dev{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(31,31,46,.95);color:#fff;
    font-size:.74rem;padding:.5rem .7rem .7rem;max-height:62vh;overflow:auto;
    transform:translateY(calc(100% - 2.2rem));transition:transform .25s}
  .dev.open{transform:none}
  .dev h3{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .4rem}
  .dev .row{display:flex;align-items:center;gap:.5rem;margin:.22rem 0}
  .dev .row label{flex:0 0 8.5rem;opacity:.85}
  .dev .row input[type=range]{flex:1;accent-color:var(--yellow)}
  .dev .row .val{flex:0 0 3.2rem;text-align:right;font-variant-numeric:tabular-nums;font-weight:800}
  .dev .btns{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap}
  .dev button{font:inherit;font-weight:800;font-size:.74rem;border:0;border-radius:.5rem;
    background:var(--yellow);color:var(--ink);padding:.34rem .6rem;cursor:pointer}
  .dev button.sec{background:#fff}
  .dev pre{white-space:pre-wrap;background:#0d0d18;border-radius:.5rem;padding:.5rem;margin-top:.5rem;
    font-size:.68rem;line-height:1.4;display:none}
  .dev pre.show{display:block}

  @media (prefers-reduced-motion:reduce){.cpanel,.cbub,.cpic{animation:none!important;opacity:1!important;transform:none!important}}
</style>
</head>
<body>
<header>
  <div class="logo" id="logo"></div>
  <div class="ctrl">
    <div class="lang" id="lang">
      <button data-l="de">DE</button><button data-l="en">EN</button><button data-l="el">GR</button>
    </div>
    <button class="play" id="play">&#9654;</button>
  </div>
</header>

<div class="stage" id="stage"></div>

<!-- Justier-Panel -->
<div class="dev" id="dev">
  <h3 id="devToggle">Animation justieren <span id="devChevron">▲</span></h3>
  <div id="devRows"></div>
  <div class="btns">
    <button id="replay">↺ Neu abspielen</button>
    <button class="sec" id="reset">Standard</button>
    <button class="sec" id="showVals">Werte zeigen</button>
  </div>
  <pre id="vals"></pre>
</div>

<script>
/* ---- Texte (DE / EN / GR) ------------------------------------------------ */
const T = {
  de:{ comic_wake:"Aufstehen und anziehen!", comic_no:"Nein! Nein! 😫",
       comic_sleep:"Zeit zum Schlafen!", comic_more:"Nur noch ein bisschen!",
       comic_morningroutine:"Zeit für die Morgenroutine! 🎵", comic_logo:"Juhu, ein Stern! ⭐",
       comic_routine:"Zeit für die Abendroutine! 🎵", comic_done:"Alles geschafft! 🏆",
       cap1:"Jeden Morgen das gleiche Theater?", cap2:"Und abends genauso.",
       cap3:"Mit Kidslist wird die Routine zum Spiel.",
       cap4:"Sammeln, schaffen, stolz sein – ganz ohne Druck.",
       study_txt:"von über 300.000 Familien sagen: Mit spielerischen Aufgaben klappt die Routine besser.",
       study_src:"(Quelle wird noch ergänzt)", soon:"Bald verfügbar", stores:"App Store · Google Play" },
  en:{ comic_wake:"Time to get up and dressed!", comic_no:"No! No! 😫",
       comic_sleep:"Time for bed!", comic_more:"Just a bit longer!",
       comic_morningroutine:"Time for the morning routine! 🎵", comic_logo:"Yay, a star! ⭐",
       comic_routine:"Time for the evening routine! 🎵", comic_done:"All done! 🏆",
       cap1:"Every morning the same drama?", cap2:"And the same every evening.",
       cap3:"With Kidslist the routine becomes a game.",
       cap4:"Collect, achieve, be proud – with no pressure.",
       study_txt:"of 300,000+ families say: playful tasks make the routine work better.",
       study_src:"(source to be added)", soon:"Coming soon", stores:"App Store · Google Play" },
  el:{ comic_wake:"Ώρα να σηκωθείς!", comic_no:"Όχι! Όχι! 😫",
       comic_sleep:"Ώρα για ύπνο!", comic_more:"Λίγο ακόμα!",
       comic_morningroutine:"Ώρα για την πρωινή ρουτίνα! 🎵", comic_logo:"Γιούπι, ένα αστέρι! ⭐",
       comic_routine:"Ώρα για τη βραδινή ρουτίνα! 🎵", comic_done:"Τα κατάφερα! 🏆",
       cap1:"Κάθε πρωί το ίδιο δράμα;", cap2:"Και κάθε βράδυ το ίδιο.",
       cap3:"Με το Kidslist η ρουτίνα γίνεται παιχνίδι.",
       cap4:"Μάζεψε, κατάφερε, καμάρωσε – χωρίς πίεση.",
       study_txt:"από 300.000+ οικογένειες λένε: με παιχνίδι η ρουτίνα πετυχαίνει καλύτερα.",
       study_src:"(η πηγή θα προστεθεί)", soon:"Σύντομα κοντά σας", stores:"App Store · Google Play" }
};

/* ---- Drehbuch: 8 Panels (2 Seiten à 4) ----------------------------------- */
const IMG='assets/img/comic/';
const PAGES = [
  { titleKey:'cap1', footKey:'cap2', panels:[
    {img:'morgen-problem-1', ph:'🛏️', tone:'morn',  bub:'comic_wake',  pos:'tl'},
    {img:'morgen-problem-2', ph:'🙅', tone:'morn',  bub:'comic_no',    pos:'br', shout:1},
    {img:'abend-problem-1',  ph:'🧸', tone:'night', bub:'comic_sleep', pos:'tl'},
    {img:'abend-problem-2',  ph:'😫', tone:'night', bub:'comic_more',  pos:'br', shout:1},
  ]},
  { titleKey:'cap3', footKey:'cap4', panels:[
    {img:'morgen-app-1', ph:'📱', tone:'morn sunny',  bub:'comic_morningroutine', pos:'tl'},
    {img:'morgen-app-2', ph:'⭐', tone:'morn sunny',  bub:'comic_logo',           pos:'br'},
    {img:'abend-app-1',  ph:'🌙', tone:'night warm',  bub:'comic_routine',        pos:'tl'},
    {img:'abend-app-2',  ph:'🏆', tone:'night warm',  bub:'comic_done',           pos:'br'},
  ]},
];
const AREAS=['a','b','c','d'];

let L = ({el:'el',en:'en',de:'de'})[(navigator.language||'de').slice(0,2).toLowerCase()] || 'de';

const LOGO_COLORS=['--pink','--blue','--green','--red','--orange','--yellow','--indigo','--magenta'];
function logoHTML(){ return [...'kidslist'].map((c,i)=>
  `<span style="color:var(${LOGO_COLORS[i%8]})">${c}</span>`).join(''); }

function panelHTML(p,idx){
  const t=T[L];
  const bub=`<div class="cbub ${p.pos}${p.shout?' shout':''}">${t[p.bub]}</div>`;
  return `<div class="cpanel ${p.tone} area-${AREAS[idx]}" data-img="${p.img}" style="--i:${idx}">
            <div class="cpic"></div><span class="cph">${p.ph}</span>${bub}</div>`;
}
function render(){
  const t=T[L];
  document.documentElement.lang = (L==='el'?'el':L);
  document.getElementById('logo').innerHTML = logoHTML();
  let h='';
  PAGES.forEach((pg,pi)=>{
    h+=`<section class="page" id="pg${pi}">
          <div class="band top">${t[pg.titleKey]}</div>
          <div class="grid">${pg.panels.map(panelHTML).join('')}</div>
          <div class="band bot">${t[pg.footKey]}</div>
        </section>`;
    if(pi===0){
      h+=`<section class="study" id="study">
            <div class="bignum">90%</div><p>${t.study_txt}</p><div class="ssrc">${t.study_src}</div>
          </section>`;
    }
  });
  h+=`<footer><div class="logo">${logoHTML()}</div>
        <div class="sub">${t.soon}</div><div class="stores">${t.stores}</div></footer>`;
  document.getElementById('stage').innerHTML=h;
  document.querySelectorAll('#lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===L));
  observe(); loadComic();
}

/* Panels poppen ein, sobald die Seite in den Blick scrollt */
let io;
function observe(){
  if(io) io.disconnect();
  io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting) e.target.classList.add('on');});},
    {threshold:0.25});
  document.querySelectorAll('.page').forEach(p=>io.observe(p));
}

/* Echte Bilder laden, sobald vorhanden – sonst bleibt das Emoji */
function loadComic(){
  document.querySelectorAll('.cpanel').forEach(el=>{
    const name=el.dataset.img; if(!name) return;
    const im=new Image();
    im.onload=()=>{ const pic=el.querySelector('.cpic'); if(pic) pic.style.backgroundImage="url('"+IMG+name+".webp')";
      const ph=el.querySelector('.cph'); if(ph) ph.style.display='none'; };
    im.src=IMG+name+'.webp';
  });
}

function setLang(l){ L=l; render(); }
function play(){
  const secs=[...document.querySelectorAll('.page,.study,footer')];
  let i=0;
  (function step(){ if(i>=secs.length) return;
    secs[i].scrollIntoView({behavior:'smooth',block:'center'});
    i++; setTimeout(step, 2800); })();
}

/* ---- Justier-Panel: Regler steuern die CSS-Variablen live ---------------- */
const SLIDERS=[
  {v:'--pageh', label:'Seitenhöhe (vh)', min:60, max:100, step:1,    unit:''},
  {v:'--stag',  label:'Panel-Tempo (s)', min:0.05,max:1.0, step:0.01, unit:'s'},
  {v:'--pop',   label:'Pop-Dauer (s)',   min:0.2, max:1.4, step:0.02, unit:'s'},
  {v:'--pops',  label:'Pop-Startgröße',  min:0.5, max:1.0, step:0.01, unit:''},
  {v:'--popr',  label:'Pop-Drehung (°)', min:0,   max:10,  step:0.5,  unit:'°'},
  {v:'--kb',    label:'Ken-Burns-Zoom',  min:1.0, max:1.25,step:0.01, unit:'×'},
  {v:'--kbt',   label:'Zoom-Dauer (s)',  min:3,   max:16,  step:0.5,  unit:'s'},
  {v:'--bubd',  label:'Blasen-Verzög. (s)',min:0, max:1.4, step:0.02, unit:'s'},
];
const DEFAULTS={};
function cssVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function buildDev(){
  SLIDERS.forEach(s=>DEFAULTS[s.v]=parseFloat(cssVar(s.v)));
  const rows=document.getElementById('devRows');
  rows.innerHTML=SLIDERS.map(s=>{
    const cur=DEFAULTS[s.v];
    return `<div class="row"><label>${s.label}</label>
      <input type="range" data-v="${s.v}" data-unit="${s.unit}" min="${s.min}" max="${s.max}" step="${s.step}" value="${cur}">
      <span class="val" id="val${s.v}">${cur}${s.unit}</span></div>`;
  }).join('');
  rows.querySelectorAll('input[type=range]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const v=inp.dataset.v, u=inp.dataset.unit;
      document.documentElement.style.setProperty(v, inp.value);
      document.getElementById('val'+v).textContent=inp.value+u;
    });
  });
}
function resetDev(){
  SLIDERS.forEach(s=>{
    document.documentElement.style.removeProperty(s.v);
  });
  // Slider zuruecksetzen auf die Stylesheet-Standardwerte
  document.querySelectorAll('#devRows input[type=range]').forEach(inp=>{
    const v=inp.dataset.v, u=inp.dataset.unit;
    inp.value=DEFAULTS[v]; document.getElementById('val'+v).textContent=DEFAULTS[v]+u;
  });
}
function showVals(){
  const pre=document.getElementById('vals');
  const lines=SLIDERS.map(s=>{
    const cur=document.documentElement.style.getPropertyValue(s.v).trim() || DEFAULTS[s.v];
    return `  ${s.v}: ${cur};`;
  });
  pre.textContent=':root{\n'+lines.join('\n')+'\n}';
  pre.classList.toggle('show');
}
function replay(){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('on'); void p.offsetWidth;
    const r=p.getBoundingClientRect();
    if(r.top < innerHeight*0.9 && r.bottom > innerHeight*0.1) p.classList.add('on');
  });
}

document.getElementById('lang').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(b) setLang(b.dataset.l);});
document.getElementById('play').addEventListener('click',play);
document.getElementById('devToggle').addEventListener('click',()=>{
  const d=document.getElementById('dev'); d.classList.toggle('open');
  document.getElementById('devChevron').textContent=d.classList.contains('open')?'▼':'▲';
});
document.getElementById('replay').addEventListener('click',replay);
document.getElementById('reset').addEventListener('click',resetDev);
document.getElementById('showVals').addEventListener('click',showVals);

render();
buildDev();
</script>
</body>
</html>
