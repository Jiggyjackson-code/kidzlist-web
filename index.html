<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidzlist – die Routine-App für kleine Kinder</title>
<style>
  @font-face{font-family:'Fredoka';font-weight:700;font-display:swap;src:url('fredoka.woff2') format('woff2')}
  :root{--rosa:#FF3B30;--orange:#FF9500;--gelb:#FFC72C;--gruen:#2ECF6E;--blau:#2D7CF6;--indigo:#5856D6;--lila:#AF52DE;--pink:#FF3D77;--tinte:#1B1B2F}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Fredoka',system-ui,sans-serif;background:#dcefff;color:#1B1B2F;overflow-x:hidden}
  #c{position:fixed;inset:0;z-index:0}
  #scroller{position:relative;z-index:1;pointer-events:none}
  .hud{position:fixed;top:.8rem;left:0;right:0;text-align:center;z-index:6;pointer-events:none;opacity:0;transition:opacity .5s}
  .hud.on{opacity:1}
  .hud svg{width:104px;height:auto;filter:drop-shadow(0 3px 8px rgba(0,0,0,.2))}
  #ov{position:fixed;inset:0;z-index:5;pointer-events:none}
  .beat{position:absolute;width:min(91%,380px);left:50%;transform:translateX(-50%);background:rgba(255,255,255,.96);border-radius:1.6rem;box-shadow:0 18px 50px rgba(0,0,0,.25);padding:1.2rem 1.1rem;text-align:center;opacity:0;pointer-events:none;transition:opacity .35s}
  .beat.on{pointer-events:auto}
  .pos-mid{bottom:7vh}
  .pos-top{top:8vh}
  .pos-bot{bottom:6vh}
  .pos-left{left:5%;transform:none;bottom:11vh;width:min(88%,340px)}
  .pos-right{left:auto;right:5%;transform:none;bottom:11vh;width:min(88%,340px)}
  .beat h2{font-size:1.4rem;margin-bottom:.25rem;line-height:1.1}
  .beat p.sub{font-size:.94rem;opacity:.78;margin-bottom:.2rem;line-height:1.34}
  .weiter{margin-top:.85rem;font-size:.82rem;opacity:.55;font-weight:600}
  .btn{display:inline-flex;align-items:center;gap:.5rem;border:none;border-radius:999px;padding:.72rem 1.4rem;font-family:inherit;font-size:1rem;font-weight:700;color:#fff;background:var(--indigo);cursor:pointer;box-shadow:0 8px 20px rgba(88,86,214,.35);text-decoration:none}
  .btn.store{background:var(--tinte);font-size:.93rem;padding:.66rem 1.1rem}
  .stores{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:.7rem}
  .intrologo svg{width:min(78vw,330px);height:auto;margin-bottom:.4rem}
  .dslink{display:block;margin-top:1rem;font-size:.8rem;opacity:.6;color:var(--tinte);text-decoration:underline}
  /* Routine */
  .rt{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin:.6rem 0 .15rem}
  .rt .t{display:flex;flex-direction:column;align-items:center;gap:.2rem;background:#f4f6fb;border:2.5px solid transparent;border-radius:.8rem;padding:.45rem .15rem;cursor:pointer;position:relative;transition:.25s}
  .rt .t img{width:1.85rem;height:1.85rem;object-fit:contain}
  .rt .t .l{font-weight:600;font-size:.58rem;line-height:1.05}
  .rt .t.ok{background:#eafaec;border-color:var(--gruen)}
  .rt .t .hk{position:absolute;top:-.35rem;right:-.35rem;width:1.25rem;height:1.25rem;border-radius:50%;background:var(--gruen);color:#fff;display:grid;place-items:center;font-size:.8rem;transform:scale(0);transition:transform .3s cubic-bezier(.2,1.5,.4,1)}
  .rt .t.ok .hk{transform:scale(1)}
  .rtwin{min-height:1.15rem;font-weight:700;color:var(--gruen);font-size:.9rem}
  /* Charaktere */
  .chrow{display:flex;flex-wrap:wrap;gap:.36rem;justify-content:center;max-height:150px;overflow:hidden;margin-top:.55rem}
  .chrow img{width:2.5rem;height:2.5rem;object-fit:contain;background:#fff;border-radius:50%;padding:.15rem;box-shadow:0 3px 8px rgba(0,0,0,.12);opacity:0;transform:translateX(-26px)}
  .beat.on .chrow img{animation:rollin .5s forwards}
  @keyframes rollin{to{opacity:1;transform:none}}
  /* Feature */
  .featrow{display:flex;align-items:center;gap:.7rem;text-align:left}
  .featrow .ic{width:3rem;height:3rem;flex:none;display:grid;place-items:center;background:#f4f6fb;border-radius:50%}
  .featrow .ic img{width:2rem;height:2rem;object-fit:contain}
  .featrow h2{font-size:1.15rem;margin:0}
  .featrow p{font-size:.85rem;opacity:.78;margin:0;line-height:1.3}
  .wis{margin-top:.5rem;background:#f7f4ff;border-radius:.8rem;padding:.5rem .6rem;font-size:.82rem;text-align:left}
  .wis b{color:var(--indigo)}
  /* Mini-Landschaften mit Tag/Nacht-Wechsel */
  .lwrap{position:relative;height:128px;border-radius:1.1rem;overflow:hidden;margin-bottom:.5rem}
  .lwrap .ph{position:absolute;inset:0;background-size:cover;background-position:center}
  .lwrap .night{opacity:0;animation:daynight 7s ease-in-out infinite alternate}
  @keyframes daynight{0%,30%{opacity:0}55%,100%{opacity:1}}
  .lsun{position:absolute;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 40% 40%,#fff6b0,#ffcf2e);box-shadow:0 0 22px #ffd23f}
  .lmoon{position:absolute;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 38% 36%,#fff,#d6def0);box-shadow:0 0 18px rgba(220,230,255,.7)}
  .lstar{position:absolute;background:#fff;border-radius:50%;opacity:.9}
  .lground{position:absolute;bottom:0;left:0;width:100%}
  .lhill{position:absolute;border-radius:50%}
  .lflake{position:absolute;color:#fff;font-size:.7rem;opacity:.9}
  /* Spiel direkt in der Karte */
  .gstage{width:min(100%,230px);margin:.5rem auto 0}
  .gmsg{min-height:1.2rem;font-weight:700;color:var(--gruen);font-size:.9rem;margin-top:.35rem}
  .ghint{font-size:.8rem;opacity:.7;margin-top:.35rem}
  .scroll-hint{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);font-size:1.6rem;opacity:.55;z-index:6;animation:bb 1.5s infinite;pointer-events:none}
  @keyframes bb{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,8px)}}
  .konf{position:fixed;top:-10px;width:.7rem;height:1rem;z-index:40;pointer-events:none;border-radius:2px}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.2}}
  /* Wellen-Finale */
  #wave{position:fixed;inset:0;z-index:15;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.5rem;
        background:radial-gradient(circle at 50% 42%,#fff 0%,#eaf3ff 55%,#dcefff 100%);
        clip-path:circle(0% at 50% 68%);transition:clip-path 1.1s cubic-bezier(.7,0,.3,1);pointer-events:none}
  #wave.on{clip-path:circle(150% at 50% 68%);pointer-events:auto}
  #wave .bald{font-size:1.05rem;font-weight:700;color:var(--indigo);letter-spacing:.04em;text-transform:uppercase;opacity:0;transition:opacity .6s .5s}
  #wave.on .bald{opacity:1}
  #wave .sub2{font-size:.95rem;opacity:0;margin:.5rem 0 .2rem;transition:opacity .6s .7s}
  #wave.on .sub2{opacity:.8}
  #wave .stores{opacity:0;transition:opacity .6s .9s}
  #wave.on .stores{opacity:1}
  #wave .intrologo{opacity:0;transition:opacity .6s .35s;transform:scale(.9)}
  #wave.on .intrologo{opacity:1;transform:none}
  #wave .dslink{opacity:0;transition:opacity .6s 1.1s}
  #wave.on .dslink{opacity:.65}
</style>
</head>
<body>
<div id="c"></div>

<div class="hud" id="hud">
  <svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" aria-label="kidzlist">
    <defs><style>.kdzwm{font-family:'Fredoka',sans-serif;font-weight:700;font-size:230px;letter-spacing:-14px;paint-order:stroke fill;stroke:#1B1B2F;stroke-width:10;stroke-linejoin:round}</style></defs>
    <text class="kdzwm" text-anchor="middle" x="610" y="270" fill="#1B1B2F">kidzlist</text>
    <text class="kdzwm" text-anchor="middle" x="600" y="260"><tspan fill="#FF3B30">k</tspan><tspan fill="#FF9500">i</tspan><tspan fill="#FFC72C">d</tspan><tspan fill="#2ECF6E">z</tspan><tspan fill="#2D7CF6">l</tspan><tspan fill="#5856D6">i</tspan><tspan fill="#AF52DE">s</tspan><tspan fill="#FF3D77">t</tspan></text>
  </svg>
</div>

<div id="ov"></div>
<div class="scroll-hint" id="hint">⌄</div>

<div id="wave">
  <div class="intrologo">
    <svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" aria-label="kidzlist">
      <text class="kdzwm" text-anchor="middle" x="610" y="270" fill="#1B1B2F">kidzlist</text>
      <text class="kdzwm" text-anchor="middle" x="600" y="260"><tspan fill="#FF3B30">k</tspan><tspan fill="#FF9500">i</tspan><tspan fill="#FFC72C">d</tspan><tspan fill="#2ECF6E">z</tspan><tspan fill="#2D7CF6">l</tspan><tspan fill="#5856D6">i</tspan><tspan fill="#AF52DE">s</tspan><tspan fill="#FF3D77">t</tspan></text>
    </svg>
  </div>
  <div class="bald">Bald verfügbar</div>
  <div class="sub2">Kostenlos. Ohne Werbung, ohne Tracking.</div>
  <div class="stores">
    <a class="btn store" href="https://apps.apple.com/app/id6780948441" target="_blank" rel="noopener">App Store</a>
    <a class="btn store" href="#" onclick="return false">▶ Google Play</a>
  </div>
  <a class="dslink" href="https://jiggyjackson-code.github.io/kidzlist-recht/" target="_blank" rel="noopener">Datenschutz & Nutzungsbedingungen</a>
</div>

<div id="scroller"></div>

<script src="lib/three.min.js"></script>
<script>
const IMG="assets/img/";
// ===== 3D-Szene =====
const scene=new THREE.Scene(); scene.background=new THREE.Color(0xdcefff); scene.fog=new THREE.Fog(0xdcefff,42,98);
let W=innerWidth,H=innerHeight,aspect=W/H,D=15;
const cam=new THREE.OrthographicCamera(-D*aspect,D*aspect,D,-D,0.1,500);
scene.add(new THREE.AmbientLight(0xffffff,0.85));
const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(12,26,6);dl.castShadow=true;
dl.shadow.mapSize.set(1024,1024);[dl.shadow.camera.left,dl.shadow.camera.right,dl.shadow.camera.top,dl.shadow.camera.bottom]=[-45,45,45,-45];scene.add(dl);
const rnd=new THREE.WebGLRenderer({antialias:true,alpha:true});rnd.setSize(W,H);rnd.setPixelRatio(Math.min(2,devicePixelRatio));rnd.shadowMap.enabled=true;rnd.shadowMap.type=THREE.PCFSoftShadowMap;
document.getElementById('c').appendChild(rnd.domElement);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(340,580),new THREE.MeshStandardMaterial({color:0x96dd83}));ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
const pts=[];for(let i=0;i<=32;i++)pts.push(new THREE.Vector3(Math.sin(i*0.5)*8,0.02,-i*7));
const curve=new THREE.CatmullRomCurve3(pts);
// Regenbogen-Weg, der sich nach vorne fortpflanzt (statt eines Fahrzeugs) – Vertex-Farben laengs der Strecke
const RB_SEG=320,RB_RAD=8;
const rbGeo=new THREE.TubeGeometry(curve,RB_SEG,1.25,RB_RAD,false);
const RB=[[1,.23,.19],[1,.58,0],[1,.78,.17],[.18,.81,.43],[.18,.49,.96],[.35,.34,.84],[.69,.32,.87]];
const rbCols=[],rbN=rbGeo.attributes.position.count;
for(let i=0;i<rbN;i++){const seg=Math.floor(i/(RB_RAD+1)),f=(seg/RB_SEG)*7*7,k=Math.floor(f)%7,k2=(k+1)%7,m=f-Math.floor(f);
  rbCols.push(RB[k][0]+(RB[k2][0]-RB[k][0])*m,RB[k][1]+(RB[k2][1]-RB[k][1])*m,RB[k][2]+(RB[k2][2]-RB[k][2])*m);}
rbGeo.setAttribute('color',new THREE.Float32BufferAttribute(rbCols,3));
const road=new THREE.Mesh(rbGeo,new THREE.MeshBasicMaterial({vertexColors:true}));road.scale.y=0.07;road.position.y=0.13;scene.add(road);
const roadMax=road.geometry.index.count;  // fuer den progressiven Aufbau
const COLS=[0xff8aa0,0x8ac7ff,0xffd23f,0xa0e090,0xc6a8ff,0xff9f6e];
function haus(x,z,w,h,col){const g=new THREE.Group();const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,w),new THREE.MeshStandardMaterial({color:col}));b.position.y=h/2;b.castShadow=true;const d=new THREE.Mesh(new THREE.ConeGeometry(w*0.82,h*0.5,4),new THREE.MeshStandardMaterial({color:0xffffff}));d.position.y=h+h*0.25;d.rotation.y=Math.PI/4;d.castShadow=true;g.add(b,d);g.position.set(x,0,z);scene.add(g);}
function baum(x,z,s){const g=new THREE.Group();const st=new THREE.Mesh(new THREE.CylinderGeometry(0.18*s,0.22*s,1.1*s,6),new THREE.MeshStandardMaterial({color:0xb07b4a}));st.position.y=0.55*s;const kr=new THREE.Mesh(new THREE.ConeGeometry(0.9*s,1.8*s,8),new THREE.MeshStandardMaterial({color:0x59b85a}));kr.position.y=1.7*s;kr.castShadow=true;g.add(st,kr);g.position.set(x,0,z);scene.add(g);}
for(let i=2;i<31;i++){const c=curve.getPointAt(i/32),side=(i%2?1:-1);if(i%2)haus(c.x+side*(6+Math.random()*4),c.z,2+Math.random()*1.5,2.5+Math.random()*4,COLS[i%6]);else baum(c.x+side*(5+Math.random()*4),c.z,0.8+Math.random()*0.7);baum(c.x-side*(7+Math.random()*5),c.z+3,0.7+Math.random()*0.5);}
// Parkplatz + Logo-Schild
function logoTex(){const cv=document.createElement('canvas');cv.width=512;cv.height=180;const x=cv.getContext('2d');
  x.fillStyle='#ffffff';x.fillRect(0,0,512,180);x.textAlign='center';x.textBaseline='middle';x.font='700 120px Fredoka, sans-serif';
  const cols=['#FF3B30','#FF9500','#FFC72C','#2ECF6E','#2D7CF6','#5856D6','#AF52DE','#FF3D77'],w='kidzlist';
  let tot=0;for(const ch of w)tot+=x.measureText(ch).width-12;let cx=256-tot/2;
  x.lineWidth=9;x.strokeStyle='#1B1B2F';x.lineJoin='round';
  for(let k=0;k<w.length;k++){const cw=x.measureText(w[k]).width-12;const px=cx+cw/2;x.strokeText(w[k],px,96);x.fillStyle=cols[k];x.fillText(w[k],px,96);cx+=cw;}
  const t=new THREE.CanvasTexture(cv);t.anisotropy=4;return t;}
// Ziel: ein Sternenfeld, in das der Regenbogen muendet (statt Parkplatz) + Logo-Schild
const STARS=[];
(function ende(){const end=curve.getPointAt(0.998);
  const sc=[0xfff7cc,0xFFC72C,0xFF9500,0x2ECF6E,0x2D7CF6,0xAF52DE,0xFF3D77];
  for(let i=0;i<80;i++){const s=new THREE.Mesh(new THREE.SphereGeometry(0.12+Math.random()*0.22,6,6),new THREE.MeshBasicMaterial({color:sc[i%sc.length]}));
    s.position.set(end.x+(Math.random()-0.5)*40,2.5+Math.random()*24,end.z-2+(Math.random()-0.5)*34);s.userData.ph=Math.random()*6.28;STARS.push(s);scene.add(s);}
  const big=new THREE.Mesh(new THREE.SphereGeometry(1.5,18,18),new THREE.MeshBasicMaterial({color:0xfff7cc}));big.position.set(end.x,13,end.z-9);scene.add(big);
  const board=new THREE.Mesh(new THREE.BoxGeometry(9,3.1,0.3),new THREE.MeshBasicMaterial({map:logoTex()}));board.position.set(end.x,4.6,end.z-9);scene.add(board);
  [-3.6,3.6].forEach(dx=>{const po=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.16,5.4,8),new THREE.MeshStandardMaterial({color:0xb07b4a}));po.position.set(end.x+dx,2.7,end.z-9);scene.add(po);});})();
// Leuchtende Spitze – der Kopf des wachsenden Regenbogens (folgt der Kamera)
const tip=new THREE.Group();
tip.add(new THREE.Mesh(new THREE.SphereGeometry(0.75,16,16),new THREE.MeshBasicMaterial({color:0xffffff})));
tip.add(new THREE.Mesh(new THREE.SphereGeometry(1.4,16,16),new THREE.MeshBasicMaterial({color:0xfff3b0,transparent:true,opacity:0.32})));
scene.add(tip);
const CAM_OFF=new THREE.Vector3(15,17,15);
function setCurveT(t){t=Math.max(0,Math.min(0.999,t));const p=curve.getPointAt(t);tip.position.set(p.x,1,p.z);cam.position.set(p.x+CAM_OFF.x,CAM_OFF.y,p.z+CAM_OFF.z);cam.lookAt(p.x,0,p.z-4);}

// ===== Mini-Landschaften (CSS – Platzhalter bis zu Gerits echten iPhone-Fotos) =====
function stars(n){let s='';for(let i=0;i<n;i++){const sz=1+Math.random()*2;s+=`<div class="lstar" style="width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*55}%"></div>`;}return s;}
function juniDay(){return `<div class="ph" style="background:linear-gradient(#7ec5ff,#cde7ff)"><div class="lsun" style="top:13px;right:22px"></div><div class="lhill" style="background:#6fbf4e;width:150px;height:88px;bottom:26%;left:-20px"></div><div class="lhill" style="background:#5fae42;width:160px;height:78px;bottom:26%;right:-30px"></div><div class="lground" style="height:28%;background:#7ec850"></div></div>`;}
function juniNight(){return `<div class="ph night" style="background:linear-gradient(#13204d,#2a3f7a)">${stars(16)}<div class="lmoon" style="top:13px;left:22px"></div><div class="lhill" style="background:#26406f;width:160px;height:80px;bottom:26%;left:-20px"></div><div class="lground" style="height:28%;background:#1c3358"></div></div>`;}
function dezDay(){let f='';for(let i=0;i<7;i++)f+=`<div class="lflake" style="left:${8+Math.random()*84}%;top:${Math.random()*62}%">❄</div>`;
  return `<div class="ph" style="background:linear-gradient(#bcd4ec,#e6f0fb)"><div class="lsun" style="top:15px;right:24px;opacity:.85;box-shadow:0 0 14px #ffe9a0"></div>${f}<div class="lhill" style="background:#eaf2fb;width:160px;height:82px;bottom:28%;left:-20px"></div><div class="lground" style="height:30%;background:#f3f8ff"></div></div>`;}
function dezNight(){return `<div class="ph night" style="background:linear-gradient(#0f1738,#23306a)">${stars(18)}<div class="lmoon" style="top:13px;left:22px"></div><div class="lhill" style="background:#d8e2f2;width:160px;height:82px;bottom:28%;left:-20px;opacity:.85"></div><div class="lground" style="height:30%;background:#cdd9ee;opacity:.85"></div></div>`;}

const STORES=`<div class="stores"><a class="btn store" href="https://apps.apple.com/app/id6780948441" target="_blank" rel="noopener">App Store</a><a class="btn store" href="#" onclick="return false">▶ Google Play</a></div>`;

const BEATS=[
 {at:0.00,pos:'mid',html:`<div class="intrologo"><svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg"><text class="kdzwm" text-anchor="middle" x="610" y="270" fill="#1B1B2F">kidzlist</text><text class="kdzwm" text-anchor="middle" x="600" y="260"><tspan fill="#FF3B30">k</tspan><tspan fill="#FF9500">i</tspan><tspan fill="#FFC72C">d</tspan><tspan fill="#2ECF6E">z</tspan><tspan fill="#2D7CF6">l</tspan><tspan fill="#5856D6">i</tspan><tspan fill="#AF52DE">s</tspan><tspan fill="#FF3D77">t</tspan></text></svg></div><p class="sub">Routine für Kinder – Aufgaben mit Belohnung & Spaß</p>${STORES}<div class="weiter">So erlebt Ihr Kind die App – scroll los ⌄</div>`},
 {at:0.08,pos:'mid',html:`<h2>Jedes Kind sein Held</h2><p class="sub">33 gemalte Charaktere – eigene Farbe, eigenes Foto.</p><div class="chrow" id="chrow"></div>`},
 {at:0.17,pos:'left',html:`<div class="lwrap">${juniDay()}${juniNight()}</div><h2 style="font-size:1.2rem">Juni</h2><p class="sub">Jeder Tag eine kleine Landschaft – Tag und Nacht.</p>`},
 {at:0.26,pos:'right',html:`<div class="lwrap">${dezDay()}${dezNight()}</div><h2 style="font-size:1.2rem">Dezember</h2><p class="sub">Jeden Monat eine neue Welt zum Sammeln.</p>`},
 {at:0.36,pos:'mid',html:`<h2>Morgenroutine</h2><p class="sub">Tipp die Aufgaben an – ganz allein.</p><div class="rt" id="rtMorgen"></div><div class="rtwin" id="winMorgen"></div>`},
 {at:0.45,pos:'mid',html:`<h2>Abendroutine</h2><p class="sub">Und abends genauso – Schritt für Schritt.</p><div class="rt" id="rtAbend"></div><div class="rtwin" id="winAbend"></div>`},
 {at:0.53,pos:'top',html:`<div class="featrow"><div class="ic"><img src="${IMG}logos/2b50.webp" alt=""></div><div><h2>Sammeln & Belohnung</h2><p>Routine geschafft = ein Logo gesammelt. Ganz ohne Druck.</p></div></div>`},
 {at:0.59,pos:'bot',html:`<div class="featrow"><div class="ic"><img src="${IMG}tasks/1f4d6.webp" alt=""></div><div><h2>Weisheiten für den Tag</h2><p>Zum Vorlesen – Morgen und Abend ein kleiner Satz.</p></div></div><div class="wis"><b>Morgens:</b> „Ein gutes Frühstück gibt dir Kraft zum Spielen."<br><b>Abends:</b> „Saubere Zähne träumen süßer."</div>`},
 {at:0.65,pos:'top',html:`<div class="featrow"><div class="ic"><img src="${IMG}ui/team.webp" alt=""></div><div><h2>Team-Modus</h2><p>Mehrere Kinder, ein Gerät – jeder hakt selbst ab.</p></div></div>`},
 {at:0.71,pos:'bot',html:`<div class="featrow"><div class="ic"><img src="${IMG}ui/kalender.webp" alt=""></div><div><h2>Tagesplaner</h2><p>Freier Plan für besondere Tage – mit Uhrzeit und Bild.</p></div></div>`},
 {at:0.78,pos:'mid',game:'swap',img:'puzzle/maerchen/01',html:`<h2>Tauschen</h2><div class="gstage"></div><div class="gmsg"></div>`},

const ov=document.getElementById('ov');
BEATS.forEach((b,i)=>{const d=document.createElement('div');d.className='beat pos-'+b.pos;d.id='b'+i;d.innerHTML=b.html;ov.appendChild(d);b.el=d;});

// Routinen füllen
const MORNING=[["1f48b","Morgen-\nKuss"],["1f6bd","Toilette"],["1f4a7","Wasser\ntrinken"],["1f6cf-fe0f","Bett\nmachen"],["1f963","Früh-\nstücken"],["1f455","Anziehen"],["1f9b7","Zähne\nputzen"],["1f487","Haare\nmachen"]];
const EVENING=[["1f9f9","Auf-\nräumen"],["1f319","Pyjama"],["1f6bd","Toilette"],["1f9b7","Zähne\nputzen"],["1f45a","Kleidung"],["1f392","Rucksack"],["1f4d6","Geschichte\nlesen"],["1f618","Nacht-\nKuss"]];
function fillRoutine(boxId,tasks,winId){const box=document.getElementById(boxId);
  tasks.forEach(t=>{const e=document.createElement('div');e.className='t';e.innerHTML=`<img src="${IMG}tasks/${t[0]}.webp" alt=""><span class="l">${t[1].replace(/\n/g,'<br>')}</span><span class="hk">✓</span>`;
    e.onclick=()=>{e.classList.toggle('ok');const n=box.querySelectorAll('.t.ok').length,w=document.getElementById(winId);if(n===tasks.length){w.textContent='Geschafft! 🎉';konf();}else w.textContent='';};box.appendChild(e);});}
fillRoutine('rtMorgen',MORNING,'winMorgen');fillRoutine('rtAbend',EVENING,'winAbend');
// Charaktere
const CHARS=["unicorn","princess","Fee","mermaid","Drache","Schmetterling","hero","Roboter","ritter","pirat","ninja","samurai","aerztin","astronautin","pilot","polizist","feuerwehr","saengerin"];
const chrow=document.getElementById('chrow');CHARS.forEach((c,k)=>{const im=document.createElement('img');im.src=IMG+'chars/'+c+'.webp';im.loading='lazy';im.style.animationDelay=(k*0.05)+'s';chrow.appendChild(im);});

// ===== Durchgehende Fahrt + aufpoppende Beats + Spiele im Beat =====
document.getElementById('scroller').style.height='1300vh';
document.documentElement.style.scrollBehavior='auto';
let curT=0,tgtT=0,waveOn=false;
const HALF=0.046;
const GAMES={swap:gSwap,insert:gInsert,scratch:gScratch,catch:gCatch};
function fromScroll(){const max=document.getElementById('scroller').offsetHeight-innerHeight;tgtT=Math.max(0,Math.min(1,scrollY/max));
  BEATS.forEach(b=>{const dist=Math.abs(tgtT-b.at);let o=Math.max(0,Math.min(1,(1-dist/HALF)*1.25));
    b.el.style.opacity=o;b.el.classList.toggle('on',o>0.55);
    if(b.game){if(o>0.8&&!b.live){b.live=true;b.clean=GAMES[b.game](b.el.querySelector('.gstage'),IMG+b.img+'.webp',b.el.querySelector('.gmsg'));}
      else if(o<0.5&&b.live){b.live=false;if(b.clean){b.clean();b.clean=null;}b.el.querySelector('.gmsg').textContent='';}}});
  document.getElementById('hud').classList.toggle('on',tgtT>0.05&&tgtT<0.95);
  document.getElementById('hint').style.opacity=(tgtT<0.04)?'.55':'0';
  const w=tgtT>0.992;if(w!==waveOn){waveOn=w;document.getElementById('wave').classList.toggle('on',w);}
}
addEventListener('scroll',fromScroll,{passive:true});
let frame=0;
function animate(){requestAnimationFrame(animate);frame++;curT+=(tgtT-curT)*0.09;setCurveT(curT);
  const seg=Math.min(1,curT+0.025);road.geometry.setDrawRange(0,Math.floor(roadMax*seg));  // Regenbogen waechst nach vorne
  const tw=1+Math.sin(frame*0.13)*0.12;tip.scale.setScalar(tw);  // Spitze pulsiert
  if(curT>0.8){for(const s of STARS){s.material.opacity=1;s.scale.setScalar(0.8+Math.sin(frame*0.05+s.userData.ph)*0.3);}}
  rnd.render(scene,cam);}
setCurveT(0);animate();fromScroll();
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;aspect=W/H;cam.left=-D*aspect;cam.right=D*aspect;cam.top=D;cam.bottom=-D;cam.updateProjectionMatrix();rnd.setSize(W,H);});

// ===== Spiele (rendern direkt in die Karte, geben eine Aufräum-Funktion zurück) =====
// Tauschen – 2x2, zwei Teile tippen tauscht sie (wie in der App)
function gSwap(st,url,msg){const N=2,n=N*N;let order=[...Array(n).keys()],sel=-1,done=false;
  do{for(let i=n-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];}}while(order.every((v,k)=>v===k));
  st.innerHTML=`<div id="sw" style="display:grid;grid-template-columns:repeat(${N},1fr);gap:4px;aspect-ratio:1"></div><div class="ghint">Tippe zwei Teile zum Tauschen</div>`;
  const sw=st.querySelector('#sw');
  function R(){sw.innerHTML='';order.forEach((o,pos)=>{const col=o%N,row=Math.floor(o/N);const d=document.createElement('div');
    d.style.cssText=`background-image:url('${url}');background-size:${N*100}% ${N*100}%;background-position:${col*100/(N-1)}% ${row*100/(N-1)}%;border-radius:8px;cursor:pointer;outline:${sel===pos?'4px solid #5856D6':'none'};outline-offset:-4px`;
    d.onclick=()=>{if(done)return;if(sel<0)sel=pos;else if(sel===pos)sel=-1;else{[order[sel],order[pos]]=[order[pos],order[sel]];sel=-1;}R();
      if(order.every((v,k)=>v===k)&&!done){done=true;msg.textContent='Geschafft! 🎉';konf();}};sw.appendChild(d);});}
  R();return()=>{done=true;};}

// Einsetzen – 2x2: Teile aus dem Tray in die Slots setzen (wie in der App)
function gInsert(st,url,msg){const N=2,n=N*N;let placed=Array(n).fill(null),tray=[...Array(n).keys()],sel=-1,done=false;
  for(let i=tray.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[tray[i],tray[j]]=[tray[j],tray[i]];}
  st.innerHTML=`<div id="bd" style="display:grid;grid-template-columns:repeat(${N},1fr);gap:4px;aspect-ratio:1;background:#eef1f7;border-radius:10px;padding:4px"></div><div id="tr" style="display:flex;gap:5px;justify-content:center;margin-top:6px"></div><div class="ghint">Tippe ein Teil, dann ein Feld</div>`;
  const bd=st.querySelector('#bd'),tr=st.querySelector('#tr');
  const piece=(p,sz,active)=>{const col=p%N,row=Math.floor(p/N);const d=document.createElement('div');
    d.style.cssText=`width:${sz};aspect-ratio:1;background-image:url('${url}');background-size:${N*100}% ${N*100}%;background-position:${col*100/(N-1)}% ${row*100/(N-1)}%;border-radius:7px;cursor:pointer;${active?'outline:4px solid #5856D6;outline-offset:-4px':''}`;return d;};
  function R(){bd.innerHTML='';for(let s=0;s<n;s++){if(placed[s]!==null){const d=piece(placed[s],'100%',false);d.onclick=()=>{if(done)return;tray.push(placed[s]);placed[s]=null;sel=-1;R();};bd.appendChild(d);}
      else{const e=document.createElement('div');e.style.cssText='aspect-ratio:1;background:#fff;border:2px dashed #c3c9d6;border-radius:7px;cursor:pointer';e.onclick=()=>{if(done||sel<0)return;placed[s]=tray[sel];tray.splice(sel,1);sel=-1;R();chk();};bd.appendChild(e);}}
    tr.innerHTML='';tray.forEach((p,ti)=>{const d=piece(p,'46px',sel===ti);d.onclick=()=>{if(done)return;sel=(sel===ti?-1:ti);R();};tr.appendChild(d);});}
  function chk(){if(!done&&placed.every((v,k)=>v===k)){done=true;msg.textContent='Geschafft! 🎉';konf();}}
  R();return()=>{done=true;};}

// Freikratzen
function gScratch(st,url,msg){st.innerHTML=`<canvas id="scv" width="300" height="300" style="width:100%;aspect-ratio:1;border-radius:10px;touch-action:none;display:block;background:url('${url}') center/cover"></canvas><div class="ghint">Mit dem Finger freikratzen</div>`;
  const cv=st.querySelector('#scv'),ctx=cv.getContext('2d');
  ctx.fillStyle='#caa6e0';ctx.fillRect(0,0,300,300);for(let i=0;i<300;i+=24){ctx.fillStyle=i%48?'#b98fd6':'#caa6e0';ctx.fillRect(i,0,12,300);}
  let down=false,done=false;const P=e=>{const r=cv.getBoundingClientRect();return[(e.clientX-r.left)*300/r.width,(e.clientY-r.top)*300/r.height];};
  const scr=e=>{if(!down||done)return;const[x,y]=P(e);ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(x,y,30,0,7);ctx.fill();
    const d=ctx.getImageData(0,0,300,300).data;let c=0,nn=0;for(let i=3;i<d.length;i+=400){nn++;if(d[i]<40)c++;}if(c/nn>0.55&&!done){done=true;msg.textContent='Geschafft! 🎉';konf();}};
  cv.addEventListener('pointerdown',e=>{down=true;scr(e);});cv.addEventListener('pointermove',scr);const up=()=>{down=false;};addEventListener('pointerup',up);
  return()=>{done=true;removeEventListener('pointerup',up);};}

// Auffangen
function gCatch(st,url,msg){st.innerHTML=`<div id="cf" style="position:relative;width:100%;aspect-ratio:1;background:linear-gradient(#bfe6ff,#dff3e0);border-radius:10px;overflow:hidden;touch-action:none"><div id="bk" style="position:absolute;bottom:3%;left:50%;width:46px;margin-left:-23px;font-size:2.2rem;text-align:center;pointer-events:none">🧺</div></div><div class="ghint">Gefangen <b id="cc">0</b>/5 – Korb schieben</div>`;
  const cf=st.querySelector('#cf'),bk=st.querySelector('#bk');let bx=50,caught=0,done=false,drops=[];
  const mv=e=>{const r=cf.getBoundingClientRect();bx=Math.max(8,Math.min(92,(e.clientX-r.left)/r.width*100));bk.style.left=bx+'%';};
  cf.addEventListener('pointermove',mv);cf.addEventListener('pointerdown',mv);
  const iv=setInterval(()=>{if(done)return;const im=document.createElement('img');im.src=url;const x=8+Math.random()*84;im.style.cssText='position:absolute;width:30px;height:30px;object-fit:contain;top:-34px;left:'+x+'%';cf.appendChild(im);drops.push({el:im,y:-34,x});},850);
  function loop(){if(done)return;requestAnimationFrame(loop);const h=cf.clientHeight;drops.forEach(o=>{if(!o.el)return;o.y+=h*0.013;o.el.style.top=o.y+'px';const yp=o.y/h*100;if(yp>78&&yp<97&&Math.abs(o.x-bx)<13){o.el.remove();o.el=null;caught++;st.querySelector('#cc').textContent=caught;if(caught>=5&&!done){done=true;msg.textContent='Geschafft! 🎉';konf();}}else if(o.y>h){o.el.remove();o.el=null;}});}
  loop();return()=>{done=true;clearInterval(iv);};}

function konf(){const cs=["#FF3B30","#FF9500","#FFC72C","#2ECF6E","#2D7CF6","#AF52DE","#FF3D77"];for(let i=0;i<50;i++){const k=document.createElement('div');k.className='konf';k.style.left=Math.random()*100+'vw';k.style.background=cs[i%7];k.style.animation=`fall ${1.4+Math.random()*1.2}s linear forwards`;k.style.animationDelay=Math.random()*.3+'s';document.body.appendChild(k);setTimeout(()=>k.remove(),3000);}}
</script>
